<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デバフ計算ツール(簡易版)v2</title>
    <style>
        :root {
            --bg: #f0f7f4; --card: #ffffff; --accent: #ff8fa3; --sub-accent: #4dabf7;
            --result-grad: linear-gradient(135deg, #4dabf7, #228be6);
            --text: #4a4a4a; --border: #e0e0e0; --input-bg: #fafafa;
            --danger: #ff6b6b; --setting-bg: #fff5f5;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding-bottom: 50px; }
        .header-area { text-align: center; margin-bottom: 20px; color: var(--text); }
        .header-title { font-size: 1.2em; font-weight: bold; margin: 10px 0 5px 0; display: block; }
        .header-note { font-size: 0.85em; color: #777; line-height: 1.4; display: block; }

        .card { background: var(--card); border-radius: 20px; padding: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid var(--border); }
        h2 { font-size: 1.1em; margin-bottom: 15px; color: var(--sub-accent); display: flex; align-items: center; gap: 8px; }
        h2::before { content: '🐾'; }
        label { display: block; font-size: 0.8em; margin-bottom: 4px; color: #888; font-weight: bold; }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        select, input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #f0f0f0; background: var(--input-bg); color: var(--text); font-size: 1em; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--sub-accent); }
        
        .target-input-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 10px; }
        .col-3 { flex: 1; min-width: 0; }
        
        .label-with-chk { display: flex; align-items: center; gap: 3px; font-size: 0.8em; margin-bottom: 4px; color: var(--danger); font-weight: bold; cursor: pointer; white-space: nowrap; }
        .label-with-chk input[type="checkbox"] { width: auto; height: auto; margin: 0; padding: 0; }

        .checkbox-label { display: flex; align-items: center; gap: 5px; font-size: 0.85em; color: var(--text); cursor: pointer; white-space: nowrap; margin-bottom: 4px; }
        .checkbox-label input { width: auto; height: auto; margin: 0; }

        .result-box { background: var(--result-grad); border-radius: 20px; padding: 20px; text-align: center; color: white; box-shadow: 0 10px 25px rgba(34, 139, 230, 0.4); margin: 25px 0; }
        .result-label { font-size: 0.9em; opacity: 0.9; margin-bottom: 5px; display: block; }
        .result-val { font-size: 2.8em; font-weight: 900; display: block; text-shadow: 2px 2px 8px rgba(0,0,0,0.2); margin: 5px 0; }
        
        .detail-box { background: rgba(0, 0, 0, 0.15); border-radius: 12px; padding: 10px 15px; margin-top: 15px; font-size: 0.85em; }
        .detail-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .btn-copy { background: #ffd43b; color: #856404; border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin: 15px 0; font-size: 1.1em; box-shadow: 0 4px 0 #d4af37; }
        .btn-copy.copied { background: #51cf66; color: white; box-shadow: 0 4px 0 #2b8a3e; }
        
        .time-box { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; font-size: 0.85em; border: 1px solid rgba(255,255,255,0.2); }
        .time-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 5px; }
        
        .mini-backup-area { display: flex; gap: 8px; margin-bottom: 15px; margin-top: 5px; }
        .btn-mini { flex: 1; font-size: 0.75em; background: #f8f9fa; border: 1px solid #dee2e6; color: #666; padding: 8px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 4px; }

        table { width: 100%; font-size: 0.85em; margin-top: 10px; border-collapse: collapse; table-layout: fixed; }
        td { border-bottom: 1px solid #f5f5f5; padding: 10px 5px; word-break: break-all; }
        .action-td { width: 90px; text-align: right; white-space: nowrap; }
        
        .btn-outline { background: white; border: 1px solid var(--sub-accent); color: var(--sub-accent); padding: 4px 6px; border-radius: 6px; font-size: 0.7em; cursor: pointer; margin-left: 2px; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; background: #eee; font-size: 0.7em; margin-bottom: 4px; color: #666; }

        .card.setting-card { background: var(--setting-bg); border: 1px dashed var(--danger); }
        .setting-grid { display: flex; gap: 10px; }
        .calc-note { font-size: 0.75em; color: #888; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <span class="header-title">デバフ計算ツール(簡易版)v2</span>
        <span class="header-note">※登録リストはブラウザ内にのみ保管されます。</span>
    </div>

    <!-- ターゲット設定 -->
    <div class="card">
        <h2>ターゲット (敵)</h2>
        <div style="display: flex; gap: 10px; margin-bottom:10px;">
            <div style="flex: 1;"><label>ギルド絞り込み</label><select id="guildFilter" onchange="updateTargetSelector()"><option value="all">すべて表示</option></select></div>
        </div>
        <label>リストから読み込む</label>
        <select id="targetSelector" onchange="applyTarget()" style="margin-bottom:15px;"><option value="manual">直接入力、またはリストから選択</option></select>
        
        <div class="target-input-row">
            <div class="col-3">
                <label>敵属性</label>
                <select id="enemyType" onchange="calculate()">
                    <option value="火">🔥 火</option>
                    <option value="水">💧 水</option>
                    <option value="草">🌿 草</option>
                </select>
            </div>
            <div class="col-3">
                <label>戦力(万)</label>
                <input type="number" id="enemyPower" value="100" oninput="calculate()">
            </div>
            <div class="col-3">
                <label class="label-with-chk">
                    <input type="checkbox" id="aceFlag" onchange="syncAcePercent('aceFlag', 'acePercent')"> 警戒補正(%)
                </label>
                <input type="number" id="acePercent" value="0" oninput="calculate()">
            </div>
        </div>
    </div>

    <!-- アタッカー設定 -->
    <div class="card">
        <h2>アタッカー (自分)</h2>
        <label>リストから読み込む</label>
        <select id="memberSelector" onchange="applyMember()" style="margin-bottom:15px;"><option value="manual">直接入力、またはリストから選択</option></select>
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;"><label>自分の属性</label><select id="myType" onchange="calculate()"><option value="火">🔥 火</option><option value="水">💧 水</option><option value="草">🌿 草</option></select></div>
            <div style="flex: 1;"><label>戦力(万)</label><input type="number" id="myPower" value="100" oninput="calculate()"></div>
        </div>
    </div>

    <!-- 計算結果 -->
    <div class="result-box">
        <span class="result-label">目標撃破数</span>
        <span id="neededBans" class="result-val">-- 班</span>
        <span id="neededPeople" style="font-size: 1.2em; font-weight: bold;">( -- 人 )</span>
        <div class="detail-box">
            <div class="detail-item"><span>敵の推定壁（補正後）</span><div><span id="detEnP">--</span>万</div></div>
            <div class="detail-item"><span>自分の戦力（属性補正後）</span><div><span id="detMyP">--</span>万</div></div>
        </div>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">班と人数をコピー</button>
        <div class="time-box">
            <div class="time-row"><span>タウン (4秒/班)</span><span id="timeLv1">--</span></div>
            <div class="time-row"><span>寮 (3秒/班)</span><span id="timeLv2">--</span></div>
            <div class="time-row"><span>城 (2秒/班)</span><span id="timeLv3">--</span></div>
        </div>
    </div>

    <hr>

    <!-- リスト登録・管理エリア -->
    <div class="card" id="memberListArea">
        <h2>味方リスト登録</h2>
        <input type="text" id="newName" placeholder="おなまえ" style="margin-bottom:8px;">
        <div style="display:flex; gap:10px; margin-bottom:12px;">
            <select id="newType" style="flex:1;"><option value="火">🔥 火</option><option value="水">💧 水</option><option value="草">🌿 草</option></select>
            <input type="number" id="newPower" placeholder="戦力(万)" style="flex:1;">
        </div>
        <button id="memberBtn" class="btn" onclick="saveData('member')">味方を保存</button>
        <div class="mini-backup-area">
            <button class="btn-mini" onclick="downloadAsFile('member')">💾 出力</button>
            <button class="btn-mini" onclick="document.getElementById('importFileMember').click()">📂 復元</button>
            <input type="file" id="importFileMember" style="display:none;" accept=".txt" onchange="importFromFile(event, 'member')">
        </div>
        <table id="memberTable"><tbody></tbody></table>
    </div>

    <div class="card" id="targetListArea">
        <h2>敵リスト登録</h2>
        <input type="text" id="newGuildName" placeholder="ギルド名" style="margin-bottom:8px;">
        <input type="text" id="newEnemyName" placeholder="敵の名前" style="margin-bottom:8px;">
        
        <div class="target-input-row" style="margin-top: 8px;">
            <div class="col-3">
                <label>属性</label>
                <select id="newEnemyType">
                    <option value="火">🔥 火</option>
                    <option value="水">💧 水</option>
                    <option value="草">🌿 草</option>
                </select>
            </div>
            <div class="col-3">
                <label>戦力(万)</label>
                <input type="number" id="newEnemyPower" placeholder="戦力">
            </div>
            <div class="col-3">
                <label class="label-with-chk">
                    <input type="checkbox" id="newEnemyAce" onchange="syncAcePercent('newEnemyAce', 'newEnemyAcePercent')"> 警戒補正(%)
                </label>
                <input type="number" id="newEnemyAcePercent" value="0">
            </div>
        </div>

        <button id="targetBtn" class="btn" style="background:#bde0fe; color:#4a90e2; margin-top:10px;" onclick="saveData('target')">敵を保存</button>
        <div class="mini-backup-area">
            <button class="btn-mini" onclick="downloadAsFile('target')">💾 出力</button>
            <button class="btn-mini" onclick="document.getElementById('importFileTarget').click()">📂 復元</button>
            <input type="file" id="importFileTarget" style="display:none;" accept=".txt" onchange="importFromFile(event, 'target')">
        </div>
        <table id="targetTable"><tbody></tbody></table>
    </div>

    <!-- 設定エリア -->
    <div class="card setting-card">
        <h2 style="color:var(--danger);">⚙️ 計算設定 (係数)</h2>
        <div class="setting-grid">
            <div style="flex:1;"><label>属性有利倍率</label><input type="number" id="c_up" value="1.2" step="0.1" oninput="calculate()"></div>
            <div style="flex:1;"><label>属性不利倍率</label><input type="number" id="c_down" value="0.8" step="0.1" oninput="calculate()"></div>
        </div>
        <div style="margin-top:10px; display: flex; gap: 10px;">
            <div style="flex:1;"><label>1班あたりの弱体化率 (%)</label><input type="number" id="c_dbf" value="1.25" step="0.01" oninput="calculate()"></div>
            <div style="flex:1;"><label>警戒補正倍率</label><input type="number" id="c_ace" value="1.2" step="0.05" oninput="calculate()"></div>
        </div>
        <div class="calc-note">※警戒補正倍率1.2の場合、チェック時に自動で「20%」が入ります。</div>
    </div>
</div>

<script>
    let members = JSON.parse(localStorage.getItem('nyanMembers') || '[]');
    let targets = JSON.parse(localStorage.getItem('nyanTargets') || '[]');
    let editIndex = { member: -1, target: -1 };

    function getTypeEmoji(type) { return {'火': '🔥', '水': '💧', '草': '🌿'}[type] || ''; }
    function formatTime(seconds) {
        if (seconds <= 0) return "0秒";
        const m = Math.floor(seconds / 60); const s = seconds % 60;
        return m > 0 ? `${m}分 ${s}秒` : `${seconds}秒`;
    }

    function syncAcePercent(chkId, numId) {
        const isChecked = document.getElementById(chkId).checked;
        const numInput = document.getElementById(numId);
        if (isChecked) {
            const aceMult = parseFloat(document.getElementById('c_ace').value) || 1.2;
            numInput.value = Math.round((aceMult - 1) * 100);
        } else {
            numInput.value = 0;
        }
        calculate();
    }

    function calculate() {
        const myP = parseFloat(document.getElementById('myPower').value) || 0;
        const myT = document.getElementById('myType').value;
        const enP = parseFloat(document.getElementById('enemyPower').value) || 0;
        const enT = document.getElementById('enemyType').value;
        const acePct = parseFloat(document.getElementById('acePercent').value) || 0;
        const aceBonusMult = 1 + (acePct / 100);

        const C_UP = parseFloat(document.getElementById('c_up').value) || 1.2;
        const C_DOWN = parseFloat(document.getElementById('c_down').value) || 0.8;
        const DBF_RATE = parseFloat(document.getElementById('c_dbf').value) || 1.25;

        let mult = 1.0;
        if ((myT === '火' && enT === '草') || (myT === '水' && enT === '火') || (myT === '草' && enT === '水')) mult = C_UP;
        else if ((myT === '火' && enT === '水') || (myT === '水' && enT === '草') || (myT === '草' && enT === '火')) mult = C_DOWN;

        const effMy = Math.floor(myP * mult);
        const effEn = Math.ceil(enP * aceBonusMult);

        document.getElementById('detMyP').innerText = effMy.toLocaleString();
        document.getElementById('detEnP').innerText = effEn.toLocaleString();

        if (effMy >= effEn || effEn <= 0) {
            document.getElementById('neededBans').innerText = "0 班";
            document.getElementById('neededPeople').innerText = "( 0 人 )";
            ["timeLv1","timeLv2","timeLv3"].forEach(id => document.getElementById(id).innerText = "0秒");
            return;
        }

        const reductionNeeded = (1 - (effMy / effEn)) * 100;
        const bans = Math.ceil(reductionNeeded / DBF_RATE);

        document.getElementById('neededBans').innerText = bans + " 班";
        document.getElementById('neededPeople').innerText = `( ${bans * 6} 人 )`;
        document.getElementById('timeLv1').innerText = formatTime(bans * 4);
        document.getElementById('timeLv2').innerText = formatTime(bans * 3);
        document.getElementById('timeLv3').innerText = formatTime(bans * 2);
    }

    function saveData(mode) {
        if (mode === 'member') {
            const data = { name: document.getElementById('newName').value, type: document.getElementById('newType').value, power: document.getElementById('newPower').value };
            if (!data.name || !data.power) return;
            if (editIndex.member > -1) members[editIndex.member] = data; else members.push(data);
            editIndex.member = -1; document.getElementById('memberBtn').innerText = "味方を保存";
            document.getElementById('newName').value=""; document.getElementById('newPower').value="";
        } else {
            const data = { 
                guild: document.getElementById('newGuildName').value || "未分類", 
                name: document.getElementById('newEnemyName').value, 
                type: document.getElementById('newEnemyType').value, 
                power: document.getElementById('newEnemyPower').value, 
                acePct: document.getElementById('newEnemyAcePercent').value || 0
            };
            if (!data.name || !data.power) return;
            if (editIndex.target > -1) targets[editIndex.target] = data; else targets.push(data);
            editIndex.target = -1; document.getElementById('targetBtn').innerText = "敵を保存";
            document.getElementById('newEnemyName').value=""; document.getElementById('newEnemyPower').value="";
            document.getElementById('newEnemyAcePercent').value=0; document.getElementById('newEnemyAce').checked=false;
        }
        localStorage.setItem(mode === 'member' ? 'nyanMembers' : 'nyanTargets', JSON.stringify(mode === 'member' ? members : targets));
        updateUI();
    }

    function editItem(mode, index) {
        if (mode === 'member') {
            const m = members[index];
            document.getElementById('newName').value = m.name; document.getElementById('newType').value = m.type; document.getElementById('newPower').value = m.power;
            editIndex.member = index; document.getElementById('memberBtn').innerText = "修正を上書き保存";
            document.getElementById('memberListArea').scrollIntoView({ behavior: 'smooth' });
        } else {
            const t = targets[index];
            document.getElementById('newGuildName').value = t.guild; document.getElementById('newEnemyName').value = t.name; document.getElementById('newEnemyType').value = t.type; document.getElementById('newEnemyPower').value = t.power;
            document.getElementById('newEnemyAcePercent').value = t.acePct || 0;
            document.getElementById('newEnemyAce').checked = (t.acePct > 0);
            editIndex.target = index; document.getElementById('targetBtn').innerText = "修正を上書き保存";
            document.getElementById('targetListArea').scrollIntoView({ behavior: 'smooth' });
        }
    }

    function deleteItem(mode, index) {
        if (!confirm("削除しますか？")) return;
        if (mode === 'member') members.splice(index, 1); else targets.splice(index, 1);
        localStorage.setItem(mode === 'member' ? 'nyanMembers' : 'nyanTargets', JSON.stringify(mode === 'member' ? members : targets));
        updateUI();
    }

    function updateUI() {
        const mSel = document.getElementById('memberSelector');
        mSel.innerHTML = '<option value="manual">直接入力、またはリストから選択</option>';
        members.forEach(m => {
            let opt = document.createElement('option');
            opt.value = `${m.power},${m.type}`;
            opt.textContent = `${getTypeEmoji(m.type)} ${m.name} (${m.power}万)`;
            mSel.appendChild(opt);
        });

        const gFil = document.getElementById('guildFilter');
        const guilds = [...new Set(targets.map(t => t.guild))];
        const currentG = gFil.value;
        gFil.innerHTML = '<option value="all">すべて表示</option>';
        guilds.forEach(g => {
            let opt = document.createElement('option');
            opt.value = g; opt.textContent = g;
            gFil.appendChild(opt);
        });
        gFil.value = currentG || "all";
        updateTargetSelector();

        const mTable = document.querySelector('#memberTable tbody');
        mTable.innerHTML = '';
        members.forEach((m, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${getTypeEmoji(m.type)} ${m.name} (${m.power}万)</td><td class="action-td"><button class="btn-outline" onclick="editItem('member', ${i})">編集</button><button class="btn-outline btn-danger" onclick="deleteItem('member', ${i})">削除</button></td>`;
            mTable.appendChild(tr);
        });

        const tTable = document.querySelector('#targetTable tbody');
        tTable.innerHTML = '';
        targets.forEach((t, i) => {
            const tr = document.createElement('tr');
            const aceMark = t.acePct > 0 ? `<span style="color:red;font-weight:bold;font-size:0.8em;">⚠️警${t.acePct}%</span>` : '';
            tr.innerHTML = `<td><span class="badge">${t.guild}</span><br>${getTypeEmoji(t.type)} ${t.name} (${t.power}万) ${aceMark}</td><td class="action-td"><button class="btn-outline" onclick="editItem('target', ${i})">編集</button><button class="btn-outline btn-danger" onclick="deleteItem('target', ${i})">削除</button></td>`;
            tTable.appendChild(tr);
        });
        calculate();
    }

    function updateTargetSelector() {
        const filter = document.getElementById('guildFilter').value;
        const tSel = document.getElementById('targetSelector');
        tSel.innerHTML = '<option value="manual">直接入力、またはリストから選択</option>';
        targets.filter(t => filter === 'all' || t.guild === filter).forEach(t => {
            let opt = document.createElement('option');
            opt.value = `${t.power},${t.type},${t.acePct || 0}`;
            opt.textContent = `${getTypeEmoji(t.type)} ${t.name} (${t.power}万)`;
            tSel.appendChild(opt);
        });
    }

    function applyMember() {
        const val = document.getElementById('memberSelector').value;
        if(val !== "manual") { const [p, t] = val.split(','); document.getElementById('myPower').value = p; document.getElementById('myType').value = t; calculate(); }
    }

    function applyTarget() {
        const val = document.getElementById('targetSelector').value;
        if(val !== "manual") { 
            const [p, t, pct] = val.split(','); 
            document.getElementById('enemyPower').value = p; 
            document.getElementById('enemyType').value = t; 
            document.getElementById('acePercent').value = pct;
            document.getElementById('aceFlag').checked = (pct > 0);
            calculate(); 
        }
    }

    // CSV風のTXT形式でダウンロード
    function downloadAsFile(mode) {
        const list = mode === 'member' ? members : targets;
        if (list.length === 0) return alert("リストが空です");
        
        let content = "";
        if (mode === 'member') {
            content = "名前,属性,戦力\n";
            list.forEach(m => { content += `${m.name},${m.type},${m.power}\n`; });
        } else {
            content = "ギルド,名前,属性,戦力,警戒補正\n";
            list.forEach(t => { content += `${t.guild},${t.name},${t.type},${t.power},${t.acePct}\n`; });
        }
        
        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `nyanko_${mode}_${new Date().getTime()}.txt`;
        a.click();
    }

    // カンマ区切りのTXTから読み込み
    function importFromFile(event, mode) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const lines = e.target.result.trim().split('\n');
                if (lines.length < 2) throw new Error("データがありません");
                
                const newList = [];
                // 1行目はヘッダーなのでスキップ
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(',');
                    if (mode === 'member' && cols.length >= 3) {
                        newList.push({ name: cols[0], type: cols[1], power: cols[2] });
                    } else if (mode === 'target' && cols.length >= 5) {
                        newList.push({ guild: cols[0], name: cols[1], type: cols[2], power: cols[3], acePct: cols[4] });
                    }
                }
                
                if (mode === 'member') members = newList; else targets = newList;
                localStorage.setItem(mode === 'member' ? 'nyanMembers' : 'nyanTargets', JSON.stringify(mode === 'member' ? members : targets));
                updateUI(); alert("復元しました");
            } catch (err) { alert("ファイルの形式が正しくありません。"); }
        };
        reader.readAsText(file);
        event.target.value = ''; // 同じファイルを再度選べるようにリセット
    }

    function copyToClipboard() {
        const people = document.getElementById('neededPeople').innerText.replace(/[() ]/g, '');
        const bans = document.getElementById('neededBans').innerText;
        navigator.clipboard.writeText(`デバフ${people}（${bans}）`).then(() => {
            const b = document.getElementById('copyBtn'); b.innerText = "コピーしました！"; b.classList.add('copied');
            setTimeout(() => { b.innerText = "班と人数をコピー"; b.classList.remove('copied'); }, 1000);
        });
    }

    updateUI();
</script>
</body>
</html>
